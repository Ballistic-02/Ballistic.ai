<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Dashboard</title>
    <!-- Include the required libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f6f9; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 15px; border: none; background-color: #007bff; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        
        /* The main report container that will be turned into a PDF */
        #report-container { background: white; padding: 30px; border: 1px solid #ddd; border-radius: 8px; }
        .chart-card { border: 1px solid #eee; padding: 15px; margin-bottom: 20px; background: #fff; border-radius: 6px; position: relative; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .download-chart-btn { background-color: #28a745; font-size: 12px; padding: 5px 10px; }
        .download-chart-btn:hover { background-color: #218838; }
        
        /* Placeholder styling for demo charts */
        .mock-chart { height: 200px; background: #e9ecef; display: flex; align-items: center; justify-content: center; color: #6c757d; font-weight: bold; border: 2px dashed #ced4da; }
    </style>
</head>
<body>

    <!-- Global Control Buttons -->
    <div class="controls">
        <button onclick="downloadPDF()">Download Full Report (PDF)</button>
    </div>

    <!-- Main Report Section -->
    <div id="report-container">
        <h2>Executive Performance Dashboard</h2>
        <p>Generated on: <span id="current-date"></span></p>
        <hr>

        <!-- Chart 1 -->
        <div class="chart-card" id="chart-1">
            <div class="chart-header">
                <h3>Monthly Revenue Trends</h3>
                <!-- Individual Chart Download Button -->
                <button class="download-chart-btn" onclick="downloadChartAsJPG('chart-1', 'revenue-chart')">Download JPG</button>
            </div>
            <div class="mock-chart">
                [ Bar Chart Visualized Here ]
            </div>
        </div>

        <!-- Chart 2 -->
        <div class="chart-card" id="chart-2">
            <div class="chart-header">
                <h3>User Growth & Retention</h3>
                <button class="download-chart-btn" onclick="downloadChartAsJPG('chart-2', 'growth-chart')">Download JPG</button>
            </div>
            <div class="mock-chart">
                [ Line Chart Visualized Here ]
            </div>
        </div>
    </div>

    <script>
        // Set current date for the report placeholder
        document.getElementById('current-date').innerText = new Date().toLocaleDateString();

        // 1. Function to download the entire container as a PDF
        function downloadPDF() {
            const element = document.getElementById('report-container');
            
            // Optional configuration for html2pdf
            const options = {
                margin:       0.5,
                filename:     'Executive_Report.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, // scale 2 ensures high-res crisp text
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Temporarily hide individual download buttons so they don't clutter the PDF
            const chartButtons = document.querySelectorAll('.download-chart-btn');
            chartButtons.forEach(btn => btn.style.display = 'none');

            // Generate PDF, then bring the buttons back
            html2pdf().set(options).from(element).save().then(() => {
                chartButtons.forEach(btn => btn.style.display = 'block');
            });
        }

        // 2. Function to capture a specific div container and download it as a JPEG
        function downloadChartAsJPG(containerId, fileName) {
            const chartElement = document.getElementById(containerId);
            
            // Temporarily hide the download button inside the chart so it isn't in the image snapshot
            const btn = chartElement.querySelector('.download-chart-btn');
            if(btn) btn.style.display = 'none';

            html2canvas(chartElement, { scale: 2, useCORS: true }).then(canvas => {
                // Bring the button back immediately after capture
                if(btn) btn.style.display = 'block';

                // Convert canvas to a JPEG data URL
                const imageURI = canvas.toDataURL('image/jpeg', 0.9);
                
                // Create a temporary anchor link to trigger the download browser dialog
                const link = document.createElement('a');
                link.download = `${fileName}.jpg`;
                link.href = imageURI;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
